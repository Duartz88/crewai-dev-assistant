design_task:
  description: >
    ⚠️ REGRA ABSOLUTA: NUNCA escrevas "Final Answer" antes de teres executado TODOS os tool calls
    obrigatórios abaixo. Listar passos que "vais executar" ou escrever chamadas de ferramenta como
    texto NÃO é válido. Tens de CHAMAR cada ferramenta e obter a sua resposta primeiro.
    Começa IMEDIATAMENTE com o primeiro tool call — não escrevas introdução nem plano.

    <pedido>
    {request}
    </pedido>

    <contexto_adicional>
    {context}
    </contexto_adicional>

    <projeto>{project_path}</projeto>

    O <contexto_adicional> acima começa sempre com o PROJECT MAP do projeto.
    ANTES DE PROPOR QUALQUER COISA: verifica o PROJECT MAP no contexto.
    - Se a rota já existe no PROJECT MAP → NÃO a recries
    - Se a classe/service já existe no PROJECT MAP → NÃO a recries
    - Se não está no PROJECT MAP → provavelmente não existe (mas confirma com read_file)

    Executa os seguintes passos em ordem. Não saltes nenhum:

    PASSO 0 — Projectos externos mencionados no pedido
    Lê o pedido com atenção. Se mencionar caminhos de outros projectos ou ficheiros externos
    (ex: "compara com C:\...", "usa como referência C:\...", "baseado em C:\..."):
    a) Usa list_project_structure nesses caminhos para mapear a sua estrutura

    PASSO 1 — Memória do projeto
    Usa a ferramenta read_project_memory com o caminho {project_path}.
    Lê e anota o que foi aprendido em execuções anteriores.

    PASSO 2 — Histórico git
    Usa a ferramenta git_log com o caminho {project_path}.
    Identifica o que mudou recentemente e quem tocou em quê.

    PASSO 3 — Estrutura do projeto actual
    O PROJECT MAP gerado automaticamente já está incluído no início do {context}.
    Usa-o directamente — NÃO chames list_project_structure para repetir o que já está lá.
    Só chamas list_project_structure se precisares de explorar um sub-directório específico
    que não aparece no PROJECT MAP, ou se suspeitas que ficheiros foram criados após o mapa ter sido gerado.

    PASSO 4 — Comparação directa de ficheiros [OBRIGATÓRIO quando o pedido pede comparação]
    Executa este passo APÓS os PASSO 1-3 para teres contexto do projecto ao comparar.
    Se o pedido mencionar ficheiros de referência para comparar com o projecto actual:
    NÃO lês os dois ficheiros e comparas mentalmente — isso produz análises incompletas.
    Em vez disso, para CADA par de ficheiros (referência vs actual):
    1. Chama compare_files com:
       - file_a = caminho do ficheiro de referência (que funciona bem)
       - file_b = caminho do ficheiro do projecto actual (a corrigir)
    2. Lê o diff LINHA A LINHA e cria um item em "issues" por cada grupo de diferenças:
       - Linhas com '-' existem apenas na referência (versão correcta)
       - Linhas com '+' existem apenas no ficheiro actual (o que está errado)
       - snippet = linhas '+' SEM o prefixo '+' (código exacto como está no ficheiro actual — old_snippet para patch)
       - patch_after = linhas '-' SEM o prefixo '-' (código correcto da referência — new_snippet para patch)
    3. REGRA DE GRANULARIDADE: cada bloco @@ do diff é um grupo de diferenças → um issue.
       Não agregar todos os problemas num único issue — cada @@ separado = issue separado.
       Um diff com 5 blocos @@ deve gerar pelo menos 5 issues.
    4. Presta atenção especial a: nomes de parâmetros, operadores, nomes de variáveis,
       strings, blocos try/catch presentes numa versão mas ausentes na outra
    5. Regista o caminho do ficheiro do PROJECTO ACTUAL (file_b) em "files_read" —
       NÃO o caminho do ficheiro de referência.
    6. REGRA DE CONTEXTO — INTENCIONAL vs BUG: Ao comparar projectos do mesmo tipo mas
       para dispositivos/produtos diferentes, estas diferenças são ESPERADAS e NÃO geram issues:
       - Nomes de drivers, produtos, executáveis e DLLs específicos do dispositivo
       - Paths/directorias que incorporam o nome do produto (ex: GlinttXXXDriver vs GlinttYYYDriver)
       - Variáveis como $driverName, $driverInstaller, $logDir com nomes de produto distintos
       Só são issues: erros de código independentes do produto — parâmetros de cmdlet inválidos,
       operadores PowerShell incorrectos, lógica condicional errada, texto corrompido,
       funcionalidade presente na referência mas COMPLETAMENTE AUSENTE no ficheiro actual.
    ⛔ REGRA ANTI-DUPLICAÇÃO: o diff do compare_files já contém TODA a informação dos
       ficheiros comparados. NÃO chames read_file para os ficheiros que acabaste de
       processar com compare_files — é redundante e enche o contexto desnecessariamente.
    Se o pedido NÃO mencionar projectos externos, avança para o PASSO 5.

    PASSO 5 — Validação de sintaxe PowerShell [OBRIGATÓRIO se o pedido envolve ficheiros .ps1 ou .psm1]
    Para CADA ficheiro PowerShell mencionado no pedido (no projecto actual, não na referência):
    1. Chama validate_powershell com o caminho COMPLETO do ficheiro
    2. Regista TODOS os erros encontrados — são bugs reais a incluir no plano
    3. Verifica MANUALMENTE no diff do PASSO 4 estes padrões que o parser pode não apanhar
       mas causam falha em runtime:
       - Parâmetros de cmdlet inexistentes: ex. `-NotColor` (correcto: `-ForegroundColor`)
       - Operadores de comparação inválidos: ex. `$null -not $var` (correcto: `$null -ne $var`)
       - Sub-expressões `$()` corrompidas com tokens extra: ex. `$($_.Exception $x.Message)`
       - Strings com caracteres não-ASCII inesperados no meio de palavras (indicador de corrupção)
       Cada padrão encontrado = issue separado com snippet da linha problemática.
    Se o pedido NÃO mencionar ficheiros PowerShell, avança directamente para o PASSO 6.

    PASSO 6 — Leitura de ficheiros relevantes
    ⛔ REGRA ANTI-DUPLICAÇÃO: Se já chamaste compare_files para um ficheiro no PASSO 4,
       NÃO chames read_file para esse mesmo ficheiro. O diff já contém toda a informação.
       Só chames read_file para ficheiros que NÃO foram comparados no PASSO 4.
    Para CADA ficheiro necessário para o plano que NÃO foi comparado no PASSO 4:
    - Chama read_file com o caminho COMPLETO: {project_path}/caminho/ficheiro
    - NUNCA uses conteúdo que viste noutros contextos (git diff, memória, etc.)
      como substituto de uma leitura directa — lê SEMPRE com read_file
    - Se read_file retornar "⚠️ TRUNCADO": o ficheiro tem mais linhas.
      TENS DE chamar read_file novamente com start_line=<próxima linha indicada>
      e repetir até leres o ficheiro completo. Só depois podes concluir o que existe.
    - Se a memória do projecto ou grep indicam que algo já existe,
      TENS DE ler esse algo com read_file antes de propor qualquer alteração.
      "Existe na memória" ≠ "implementação completa" — verifica sempre.
    - Antes de propor criar novos ficheiros (screens, componentes), lê um ficheiro
      existente do mesmo tipo para garantir que segues o padrão do projecto.

    PASSO 6b — Verificação de endpoints/API [OBRIGATÓRIO se o pedido envolve dados]
    Se o pedido envolve listar, mostrar ou buscar dados da API:
    1. Usa list_project_structure para localizar os routers do backend
    2. Lê os routers relevantes com read_file
    3. Para CADA endpoint que vais propor no plano, chama mark_endpoint_verified
       - Se devolver ✅ → inclui o endpoint no plano com ficheiro e linha
       - Se devolver ❌ → o endpoint não existe; propõe criá-lo ou usa outro
    Sem chamar mark_endpoint_verified, o plano está incompleto.
    "Preciso verificar" ou "vou verificar" no plano = NÃO FIZESTE ESTE PASSO.

    PASSO 7 — Verificação de cobertura ANTES de produzir o plano
    Antes de escrever o plano, verifica:
    - Quantos pares de ficheiros comparaste no PASSO 4? (ex: 2 pares)
    - Tens issues para TODOS os ficheiros do projecto? (ex: issues para os 2 ficheiros)
    - Se falta algum ficheiro → STOP, volta ao PASSO 4 e compara o ficheiro em falta.
    Só depois produz o plano com base em TUDO o que leste.
    Para tarefas de comparação: para cada issue, inclui no "plan" um bloco ANTES/DEPOIS:
    - ANTES = código ERRADO no ficheiro actual (linhas '+' do diff — o que está a corrigir)
      → Igual ao campo "snippet" do issue
    - DEPOIS = código CORRECTO após a correcção (baseado nas linhas '-' da referência)
      → Igual ao campo "patch_after" do issue
    Nunca inverteres a ordem: ANTES mostra o problema, DEPOIS mostra a solução.
    Copia do diff — não inventes código.

    VERIFICAÇÃO FINAL — CONFIRMA (NÃO RE-EXECUTA) antes de "Final Answer":
    Olha para os tool calls que já fizeste acima e confirma cada item:
    - [ ] Chamei read_project_memory? (PASSO 1)
    - [ ] Chamei git_log? (PASSO 2)
    - [ ] Li o PROJECT MAP no contexto (ou chamei list_project_structure se necessário)? (PASSO 3)
    - [ ] Se o pedido envolve comparação: chamei compare_files para CADA par de ficheiros? (PASSO 4)
    - [ ] Tenho pelo menos um issue por ficheiro do projecto que comparei? (PASSO 4)
    - [ ] Se o pedido envolve .ps1/.psm1: chamei validate_powershell para cada .ps1 do projecto? (PASSO 5)
    - [ ] Se o pedido envolve dados da API: chamei mark_endpoint_verified? (PASSO 6b)

    ⛔ SE JÁ EXECUTASTE TODOS OS PASSOS APLICÁVEIS → escreve "Final Answer" agora.
    ⛔ NÃO REPITAS ferramentas que já chamaste para o mesmo ficheiro.
    ⛔ O checklist é para CONFIRMAR o que já fizeste — NÃO para re-executar.
    ⛔ "Final Answer" sem tool calls = RESPOSTA INVÁLIDA. Executa primeiro, responde depois.

    RESTRIÇÕES:
    - Não propões criar diretórios de topo a não ser que o pedido o exija explicitamente
    - Listas TODOS os endpoints/funções/classes existentes nos ficheiros a modificar
    - O plano cobre APENAS o que é pedido — sem melhorias não solicitadas
    - Se o pedido for ambíguo, incluis uma secção "Perguntas" no campo "plan"

    OUTPUT OBRIGATÓRIO — JSON PURO:
    O teu "Final Answer" DEVE começar IMEDIATAMENTE com '{' — sem prefixos, sem ```json,
    sem "Here is the output", sem nenhum texto antes do JSON. JSON puro directo.
    ⚠️ JSON ESCAPING OBRIGATÓRIO: Dentro de strings JSON, a barra invertida (\) DEVE ser
    duplicada (\\). Exemplos correctos: "C:\\\_PROJECTS\\\\file.ps1", "tools\\\\install.ps1".
    Uma barra simples antes de letras (ex: \_  \P  \d  \C) é JSON INVÁLIDO e rejeita o output.
    Campos obrigatórios:
    - "files_read": paths dos ficheiros do PROJECTO ACTUAL que leste ou comparaste.
      NÃO incluis ficheiros de referência externos. OBRIGATÓRIO — vazio = rejeitado.
    - "issues": um item por bloco de diferenças (@@ do diff) ou por erro de sintaxe.
      Cada item: {file, line, description, snippet, patch_after, severity}.
      file = caminho ABSOLUTO completo do ficheiro no disco.
             REGRA: {project_path} + subpasta_do_pacote + caminho_relativo.
             Exemplo: se project_path="C:\\proj\\" e o PROJECT MAP mostra "pkg\\tools\\file.ps1",
             então file="C:\\proj\\pkg\\tools\\file.ps1" — NUNCA "C:\\proj\\tools\\file.ps1".
             Verifica SEMPRE copiando o path de um read_file bem-sucedido, não de memória.
      snippet = código exacto como está no ficheiro actual (linhas '+' do diff SEM o prefixo '+').
               É o old_snippet para patch — deve ser verbatim, sem marcadores de diff.
      patch_after = código correcto após a correcção (linhas '-' do diff SEM o prefixo '-').
                    É o new_snippet para patch — verbatim, sem marcadores de diff.
                    Deixa "" APENAS para erros de sintaxe sem solução directa da referência.
      Issue sem snippet = inválido. Não agregar múltiplas diferenças num único issue.
    - "changes": ficheiros do projecto a modificar, um por ficheiro. {path, action, reason, location}
    - "endpoints_verified": endpoints verificados (vazio [] se não aplicável)
    - "plan": markdown em português com ANTES/DEPOIS para cada issue (código exacto do diff)

    Coloca todo o conteúdo textual dentro do campo "plan" em markdown.
    Fora do JSON não podes escrever absolutamente nada.
  expected_output: >
    JSON com campos: files_read (paths dos ficheiros lidos), issues (problemas com evidência
    file+line+snippet+patch_after), changes (ficheiros a criar/modificar com localização),
    endpoints_verified, e plan (plano completo em markdown português com blocos ANTES/DEPOIS).
    files_read vazio = plano inválido. Issue sem snippet = issue inválido.
    patch_after vazio em tarefas de comparação = informação incompleta.
  agent: architect

implement_task:
  description: >
    <plano>
    {context}
    </plano>

    <pedido>{request}</pedido>
    <projeto>{project_path}</projeto>

    O <plano> é um JSON com: "issues" (problemas + snippets), "changes" (ficheiros a modificar), "plan" (blocos ANTES/DEPOIS em markdown).

    ⚡ VIA RÁPIDA — usa SEMPRE que o campo "plan" tiver blocos ANTES/DEPOIS:

    📦 MODO BATCH — quando há MÚLTIPLAS correcções no MESMO ficheiro (≥2 issues para o mesmo path):
    1. Agrupa TODAS as correcções desse ficheiro numa única chamada a patch_file_multi:
       - filename = caminho absoluto do ficheiro
       - patches = lista de {old_snippet, new_snippet} para CADA correcção do ficheiro
    2. patch_file_multi aplica todas as alterações de uma vez e só escreve o ficheiro no final
    3. Se algum old_snippet falhar, nenhuma alteração é aplicada — corrige e repete
    → Um ficheiro com 5 correcções = 1 chamada patch_file_multi, NÃO 5 chamadas patch_file

    🔧 MODO SINGLE — quando há apenas 1 correcção num ficheiro:
    1. Usa patch_file com old_snippet = bloco ANTES e new_snippet = bloco DEPOIS
    2. Se patch_file retornar "não encontrado": ENTÃO lê com read_file e tenta de novo
    3. Se patch_file retornar BLOQUEADO: corrige new_snippet e repete

    🐌 VIA LENTA — usa APENAS quando NÃO há blocos ANTES/DEPOIS no campo "plan":
    1. Lê o ficheiro com read_file (usa start_line se souberes a linha)
    2. Copia o trecho exacto para old_snippet (com 2-3 linhas de contexto)
    3. Para múltiplas correcções no mesmo ficheiro: usa patch_file_multi
    4. Para uma única correcção: usa patch_file

    PARA FICHEIROS NOVOS (action = "create"):
    - Usa write_file para criar o ficheiro
    - Se .py: valida com validate_python_syntax primeiro
    - Se .ts/.tsx: valida com validate_typescript (filename + content)

    PARA FICHEIROS DE SERVIÇO/API (api.ts, services/*.ts):
    - Lê o ficheiro com read_file para ver métodos existentes antes de adicionar novos

    PROIBIDO:
    - Usar write_file em ficheiros que já existem — usa patch_file
    - Ler o ficheiro completo quando o "plan" já tem ANTES/DEPOIS — é desperdício de contexto
    - Reconstruir código de memória — copia sempre do plano ou do read_file
    - Criar ficheiros não incluídos em changes

    NO FINAL: usa write_project_memory para registar decisões importantes.

    OUTPUT — JSON obrigatório com estes campos:
    {"files_modified": [...caminhos absolutos...], "files_created": [...], "syntax_errors": [{file, line, description, snippet}], "summary": "...markdown..."}
    Não escrevas nada fora do JSON.
  expected_output: >
    JSON: files_modified, files_created, syntax_errors, summary (markdown PT com ANTES/DEPOIS).
  agent: developer

fix_task:
  description: >
    <problemas_a_corrigir>
    {context}
    </problemas_a_corrigir>

    <pedido>{request}</pedido>
    <projeto>{project_path}</projeto>

    O Reviewer identificou os problemas acima. Corrige APENAS esses problemas.

    Para cada problema, usa a VIA MAIS RÁPIDA disponível:

    📦 MODO BATCH — quando há MÚLTIPLAS correcções no MESMO ficheiro (≥2 issues para o mesmo path):
    1. Agrupa TODAS as correcções desse ficheiro numa única chamada a patch_file_multi:
       - filename = caminho absoluto do ficheiro
       - patches = lista de {old_snippet, new_snippet} com os snippets dos issues
    2. Se algum old_snippet falhar, nenhuma alteração é escrita — corrige e repete
    → Um ficheiro com 5 correcções = 1 chamada patch_file_multi, NÃO 5 chamadas patch_file

    ⚡ MODO SINGLE — se há apenas 1 correcção num ficheiro E o issue tem "snippet":
    1. Usa patch_file com old_snippet = código do snippet e new_snippet = versão corrigida
    2. Se patch_file retornar "não encontrado": ENTÃO lê com read_file e tenta de novo

    🐌 Se não há snippet suficiente:
    1. Lê o ficheiro com read_file (usa start_line se souberes a linha)
    2. Copia old_snippet literalmente, escreve new_snippet corrigido
    3. Para múltiplas correcções no mesmo ficheiro: usa patch_file_multi
    4. Para uma única correcção: usa patch_file

    PROIBIDO:
    - Usar write_file em ficheiros existentes — usa patch_file
    - Corrigir mais do que os problemas listados pelo Reviewer
    - Ler o ficheiro inteiro quando o snippet já é suficiente

    OUTPUT — JSON obrigatório:
    {"files_modified": [...], "files_created": [...], "syntax_errors": [{file, line, description, snippet}], "summary": "...estado de cada correcção com ANTES/DEPOIS..."}
    Não escrevas nada fora do JSON.
  expected_output: >
    JSON: files_modified, files_created, syntax_errors, summary (markdown PT com estado e ANTES/DEPOIS).
  agent: developer

review_task:
  description: >
    <implementacao_a_rever>
    {context}
    </implementacao_a_rever>

    <pedido_original>
    {request}
    </pedido_original>

    <projeto>{project_path}</projeto>

    O <implementacao_a_rever> é um JSON com campos: files_modified, files_created,
    syntax_errors, summary. Lê o campo "files_modified" e "files_created" para saber
    que ficheiros verificar. Lê o campo "syntax_errors" — estes são problemas já detectados.

    Revê a implementação executando estes passos em ordem:

    PASSO 1 — Testes automáticos
    Usa run_tests com o caminho {project_path}.
    Regista o resultado exacto (passou/falhou/sem testes).

    PASSO 2 — Verificação dos ficheiros modificados
    O campo "summary" do contexto contém os blocos ANTES/DEPOIS de cada alteração.
    Verifica a correctura directamente a partir do summary — é mais eficiente e evita
    encher o contexto com ficheiros completos.
    Se precisares de confirmar o contexto ao redor de uma linha específica:
    - Usa read_file com start_line e end_line (ex: start_line=10, end_line=40)
    - NUNCA leres um ficheiro completo sem start_line/end_line — é desperdício de contexto
    Se o pedido original referenciar ficheiros de outro projecto para comparação directa:
    - Usa grep_in_files ou compare_files em vez de read_file completo

    PASSO 2b — Validação de sintaxe PowerShell [se aplicável]
    Se o contexto ou o pedido original referenciar ficheiros .ps1 ou .psm1:
    Para CADA ficheiro PowerShell mencionado no contexto (usa o caminho COMPLETO tal como aparece):
    1. Chama validate_powershell com esse caminho
    2. Regista TODOS os erros encontrados (linha exacta, descrição)
    3. Adiciona estes erros como problemas adicionais na secção "Problemas a corrigir"
    Os erros de sintaxe PowerShell são SEMPRE problemas reais — inclui todos sem filtrar.

    PASSO 3 — Verificação do checklist
    Para cada ponto abaixo, responde Sim ou Não com justificação:

    1. Todos os endpoints/funções que existiam antes ainda existem?
    2. Os imports Python usam pontos (ex: from app.models import X)?
    3. Foram criados ficheiros fora do plano aprovado?
    4. Os testes automáticos passam (ou não existiam antes)?
    5. O código segue os padrões existentes no projeto?
    6. Existem paths hardcoded, credenciais ou console.log esquecidos?

    PASSO 4 — Memória
    Usa write_project_memory para registar padrões úteis ou problemas recorrentes.

    REGRAS DE EVIDÊNCIA — OBRIGATÓRIAS:
    Cada problema no campo "issues" DEVE ter:
    - "file": caminho absoluto do ficheiro (copiado do read_file)
    - "line": número de linha exacto
    - "snippet": trecho de código copiado do read_file que prova o problema
    Um problema sem snippet é inválido e será ignorado automaticamente.
    "O código parece errado" sem prova de ficheiro = NÃO É UM PROBLEMA VÁLIDO.

    OUTPUT OBRIGATÓRIO — JSON:
    O teu "Final Answer" DEVE ser um objecto JSON válido com exactamente estes campos:
    - "approved": true se aprovado, false se requer correcções
    - "issues": lista de problemas APENAS com evidência real {file, line, description, snippet, severity}
    - "tests_passed": true / false / null (null se não há testes)
    - "verdict": "Aprovado" ou "Requer correções: <motivo>"
    - "summary": relatório completo em markdown português

    Se approved=false, issues NÃO pode estar vazio.
    Se approved=true, issues DEVE estar vazio.
    Não escrevas markdown fora do JSON. Coloca tudo dentro do campo "summary".
  expected_output: >
    JSON com campos: approved (bool), issues (problemas com file+line+snippet obrigatórios),
    tests_passed (true/false/null), verdict ("Aprovado" ou "Requer correções: motivo"),
    e summary (relatório completo em markdown português).
    Issue sem snippet é automaticamente inválido.
  agent: reviewer
