design_task:
  description: >
    <pedido>
    {request}
    </pedido>

    <contexto_adicional>
    {context}
    </contexto_adicional>

    <projeto>{project_path}</projeto>

    Executa os seguintes passos em ordem. Não saltes nenhum:

    PASSO 0 — Projectos externos mencionados no pedido
    Lê o pedido com atenção. Se mencionar caminhos de outros projectos ou ficheiros externos
    (ex: "compara com C:\...", "usa como referência C:\...", "baseado em C:\..."):
    a) Usa list_project_structure nesses caminhos para mapear a sua estrutura
    b) Usa read_file para ler CADA ficheiro externo mencionado explicitamente
    c) Regista o conteúdo desses ficheiros — vais precisar para a comparação
    Se o pedido NÃO mencionar projectos externos, avança para o PASSO 1.

    PASSO 1 — Memória do projeto
    Usa a ferramenta read_project_memory com o caminho {project_path}.
    Lê e anota o que foi aprendido em execuções anteriores.

    PASSO 2 — Histórico git
    Usa a ferramenta git_log com o caminho {project_path}.
    Identifica o que mudou recentemente e quem tocou em quê.

    PASSO 3 — Estrutura do projeto actual [OBRIGATÓRIO]
    Chama list_project_structure com o caminho {project_path}.
    NÃO SALTES ESTE PASSO mesmo que já conheças a estrutura.

    PASSO 4 — Leitura de ficheiros relevantes [OBRIGATÓRIO]
    Para CADA ficheiro mencionado no pedido ou necessário para o plano:
    - Chama read_file com o caminho COMPLETO: {project_path}/caminho/ficheiro
    - NUNCA uses conteúdo que viste noutros contextos (git diff, memória, etc.)
      como substituto de uma leitura directa — lê SEMPRE com read_file
    - Se read_file retornar "⚠️ TRUNCADO": o ficheiro tem mais linhas.
      TENS DE chamar read_file novamente com start_line=<próxima linha indicada>
      e repetir até leres o ficheiro completo. Só depois podes concluir o que existe.
    - Se o pedido pedir para "ler" ou "entender" um ficheiro específico,
      TENS DE CHAMAR read_file para esse ficheiro. Não há excepção.
    - Se a memória do projecto ou grep indicam que algo já existe,
      TENS DE ler esse algo com read_file antes de propor qualquer alteração.
      "Existe na memória" ≠ "implementação completa" — verifica sempre.
    - Antes de propor criar novos ficheiros (screens, componentes), lê um ficheiro
      existente do mesmo tipo para garantir que segues o padrão do projecto.

    PASSO 4b — Verificação de endpoints/API [OBRIGATÓRIO se o pedido envolve dados]
    Se o pedido envolve listar, mostrar ou buscar dados da API:
    1. Usa list_project_structure para localizar os routers do backend
    2. Lê os routers relevantes com read_file
    3. Para CADA endpoint que vais propor no plano, chama mark_endpoint_verified
       - Se devolver ✅ → inclui o endpoint no plano com ficheiro e linha
       - Se devolver ❌ → o endpoint não existe; propõe criá-lo ou usa outro
    Sem chamar mark_endpoint_verified, o plano está incompleto.
    "Preciso verificar" ou "vou verificar" no plano = NÃO FIZESTE ESTE PASSO.

    PASSO 5 — Produz o plano
    Com base em TUDO o que leste (projectos externos + projecto actual), produz o plano.
    Para tarefas de comparação: documenta diferenças concretas com trechos de código.

    VERIFICAÇÃO ANTES DE RESPONDER:
    - [ ] Chamei read_project_memory? (PASSO 1)
    - [ ] Chamei git_log? (PASSO 2)
    - [ ] Chamei list_project_structure? (PASSO 3)
    - [ ] Chamei read_file para todos os ficheiros relevantes? (PASSO 4)
    - [ ] Se o pedido envolve dados da API: chamei mark_endpoint_verified
          para cada endpoint proposto? (PASSO 4b)
          Se NÃO → chama agora. O plano sem mark_endpoint_verified será rejeitado.
    Se algum NÃO, executa-o agora antes de produzir o plano.

    RESTRIÇÕES:
    - Não propões criar diretórios de topo a não ser que o pedido o exija explicitamente
    - Listas TODOS os endpoints/funções/classes existentes nos ficheiros a modificar
    - O plano cobre APENAS o que é pedido — sem melhorias não solicitadas
    - Se o pedido for ambíguo, incluis uma secção "Perguntas" com as dúvidas

    Responde em português.
  expected_output: >
    ## Contexto do projeto
    [O que aprendeste da memória + git log: decisões anteriores, padrões, mudanças recentes]

    ## Pedido
    [Resumo claro do que foi pedido]

    ## Endpoints verificados (obrigatório se o pedido envolve dados da API)
    Preenche com os resultados de mark_endpoint_verified, um por linha:
    - `GET /points/MEMBER_ID` — api/app/routers/points.py linha 27 — PointsBalanceOut
    (omite esta secção se o pedido não envolver endpoints da API)

    ## Análise dos ficheiros existentes
    [Para cada ficheiro relevante: lista de endpoints/funções/classes que já existem e DEVEM ser preservados]

    ## Plano de implementação

    ### Ficheiros a CRIAR
    - `caminho/ficheiro.ext` — propósito claro

    ### Ficheiros a MODIFICAR
    - `caminho/ficheiro.ext`
      - Preservar: [lista de o que não deve ser tocado]
      - Localização exacta: linha ~N, função/componente `nomeDaFunção`
      - Endpoint/serviço usado: `MÉTODO /caminho` encontrado em `router/ficheiro.py` linha ~N
        (ou "não existe — criar endpoint com schema X")
      - Código ACTUAL nessa localização (copiado do read_file):
        ```
        [trecho exacto que vai ser alterado]
        ```
      - Código DEPOIS da alteração:
        ```
        [como deve ficar]
        ```

    ### Ficheiros a NÃO TOCAR
    - [razão pela qual não devem ser modificados]

    ## Perguntas ao utilizador (se aplicável)
    [Dúvidas que precisam de resposta antes de implementar — omite esta secção se não existirem]
  agent: architect

implement_task:
  description: >
    <plano_aprovado>
    {context}
    </plano_aprovado>

    <pedido>
    {request}
    </pedido>

    <projeto>{project_path}</projeto>

    Implementa o pedido seguindo o plano/contexto acima. Para cada ficheiro, segue estes passos:

    PARA CADA FICHEIRO A CRIAR (novo, não existe):
    1. Se for .py: valida com validate_python_syntax antes de escrever
    2. Se for .ts/.tsx: valida com validate_typescript (com AMBOS os argumentos: filename E content)
    3. Usa write_file para criar o ficheiro

    PARA FICHEIROS DE SERVIÇO/API (api.ts, services/*.ts, *.service.ts):
    1. Lê o ficheiro com read_file para ver os métodos que já existem
    2. Para cada método NOVO que o plano pede para adicionar:
       - Chama mark_endpoint_verified para confirmar que o endpoint backend existe
       - Se ❌: não adiciones o método — informa que o endpoint não existe
    3. Se o plano menciona um método que já existe no ficheiro → não o reescrevas

    PARA CADA FICHEIRO A MODIFICAR (já existe):
    1. Lê o conteúdo COMPLETO com read_file
    2. RACIOCÍNIO OBRIGATÓRIO — antes de qualquer patch, escreve em texto:
       a) "Localização: linha ~N, função/componente X"
       b) "Código actual: [copia literalmente do read_file]"
       c) "Vou alterar para: [o novo código]"
       Se não identificas a localização exacta com base no plano, PARA e relê o plano.
       Não patches por adivinhação.
    3. ATENÇÃO — UI vs dados (erro comum):
       - Alterações de UI (React Native/Angular): procura o componente JSX que RENDERIZA
         o elemento (TouchableOpacity, onPress, onClick) — NÃO a função de carregamento
       - Alterações de dados/API: procura a função que chama o endpoint
       Nunca confundas rendering com data loading.
    4. Usa patch_file com:
       - old_snippet: copiado LITERALMENTE do read_file, com 2-3 linhas de contexto
       - new_snippet: o mesmo trecho com APENAS as linhas alteradas
    5. Se patch_file retornar "não encontrado": volta ao read_file, copia de novo, repete
    6. Se patch_file retornar BLOQUEADO: corrige new_snippet antes de tentar outra vez

    PROIBIDO:
    - Usar write_file em ficheiros que já existem — usa patch_file
    - Reescrever o ficheiro inteiro quando só 1-2 funções precisam de mudar
    - Reconstruir código de memória — copia SEMPRE do read_file
    - Criar ficheiros que não estejam no plano
    - Patchar uma função diferente da identificada no plano do arquitecto

    NO FINAL:
    Usa write_project_memory para registar as decisões de implementação mais importantes.

    Responde em português.
  expected_output: >
    ## Ficheiros processados

    Para cada ficheiro modificado usa EXACTAMENTE este formato:

    ### `caminho/ficheiro.ext` — MODIFICADO

    **ANTES:**
    ```lang
    [bloco de código original que foi alterado]
    ```
    **DEPOIS:**
    ```lang
    [bloco de código novo que substituiu o original]
    ```

    Para ficheiros criados:

    ### `caminho/ficheiro.ext` — CRIADO
    ```lang
    [conteúdo completo do ficheiro]
    ```

    ## Confirmações
    - Nenhuma funcionalidade existente foi removida: Sim/Não
    - Todos os ficheiros do plano foram processados: Sim/Não
    - Memória do projeto actualizada: Sim/Não

    ## Notas de implementação
    [Decisões técnicas relevantes e problemas encontrados]
  agent: developer

fix_task:
  description: >
    <problemas_a_corrigir>
    {context}
    </problemas_a_corrigir>

    <pedido>
    {request}
    </pedido>

    <projeto>{project_path}</projeto>

    O Reviewer identificou os problemas no contexto acima. Corrige APENAS esses problemas.

    Para cada problema listado:
    1. Lê o ficheiro actual com read_file
    2. Identifica o trecho MÍNIMO que contém o problema
    3. Usa patch_file com old_snippet copiado LITERALMENTE do read_file e new_snippet corrigido
    4. Se patch_file retornar BLOQUEADO (sintaxe): corrige new_snippet
    5. Se patch_file retornar "não encontrado": relê o ficheiro, copia de novo

    PROIBIDO:
    - Usar write_file em ficheiros que já existem — usa patch_file
    - Corrigir mais do que os problemas listados pelo Reviewer
    - Reconstruir código de memória — copia SEMPRE do read_file

    Responde em português.
  expected_output: >
    ## Correcções aplicadas

    Para cada problema usa EXACTAMENTE este formato:

    ### Problema [N]: [descrição]
    **Ficheiro:** `caminho/ficheiro.ext`

    **ANTES:**
    ```lang
    [código com o problema]
    ```
    **DEPOIS:**
    ```lang
    [código corrigido]
    ```
    **Estado:** Resolvido / Parcialmente resolvido (explica porquê)

    ## Confirmação
    Todos os problemas identificados foram endereçados: Sim/Não
  agent: developer

review_task:
  description: >
    <implementacao_a_rever>
    {context}
    </implementacao_a_rever>

    <pedido_original>
    {request}
    </pedido_original>

    <projeto>{project_path}</projeto>

    Revê a implementação executando estes passos em ordem:

    PASSO 1 — Testes automáticos
    Usa run_tests com o caminho {project_path}.
    Regista o resultado exacto (passou/falhou/sem testes).

    PASSO 2 — Leitura dos ficheiros modificados
    Usa read_file para cada ficheiro que foi alterado (menciona o contexto acima).
    Se o pedido original referenciar ficheiros de outro projecto, usa read_file
    nesses ficheiros externos para comparação directa.

    PASSO 3 — Verificação do checklist
    Para cada ponto abaixo, responde Sim ou Não com justificação:

    1. Todos os endpoints/funções que existiam antes ainda existem?
    2. Os imports Python usam pontos (ex: from app.models import X)?
    3. Foram criados ficheiros fora do plano aprovado?
    4. Os testes automáticos passam (ou não existiam antes)?
    5. O código segue os padrões existentes no projeto?
    6. Existem paths hardcoded, credenciais ou console.log esquecidos?

    PASSO 4 — Memória
    Usa write_project_memory para registar padrões úteis ou problemas recorrentes.

    Responde em português.
  expected_output: >
    ## Resultado dos testes
    [Output exacto do run_tests ou "Sem suite de testes detectada"]

    ## Checklist de revisão
    1. Endpoints/funções preservados: Sim/Não — [detalhe]
    2. Imports Python correctos: Sim/Não — [detalhe]
    3. Scope respeitado (sem ficheiros extra): Sim/Não — [detalhe]
    4. Testes passam: Sim/Não — [detalhe]
    5. Padrões do projeto seguidos: Sim/Não — [detalhe]
    6. Sem problemas de qualidade (paths, credenciais, logs): Sim/Não — [detalhe]

    ## Veredicto
    Aprovado
    ou
    Requer correções

    ## Problemas a corrigir (se aplicável)
    [Lista numerada e precisa — omite se aprovado]
  agent: reviewer
