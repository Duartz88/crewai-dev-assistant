design_task:
  description: >
    Começa por:
    1. read_project_memory em {project_path} — aprende com runs anteriores
    2. git_log em {project_path} — vê o que mudou recentemente
    3. list_project_structure em {project_path} — explora a estrutura atual
    4. read_file nos ficheiros relevantes para o pedido

    Depois analisa: {feature_request}

    REGRAS OBRIGATÓRIAS:
    - Não propores diretórios de topo não pedidos explicitamente
    - Listar TODOS os endpoints/funções existentes nos ficheiros a modificar
    - Focar apenas no necessário — sem extras não pedidos
    - Se o pedido for ambíguo, inclui uma pergunta clara no plano

    Responde em português.
  expected_output: >
    ## Contexto do projeto
    <o que aprendeste da memória e do git log>

    ## Pedido
    <resumo do pedido>

    ## Ficheiros a CRIAR
    - `path/ficheiro` — <propósito>

    ## Ficheiros a MODIFICAR
    - `path/ficheiro`
      - Preservar: <endpoints/funções existentes>
      - Adicionar: <o que muda>

    ## Ficheiros a NÃO TOCAR
    - <razão>

    ## Perguntas ao utilizador (se aplicável)
    <dúvidas a esclarecer antes de implementar>
  agent: architect

implement_task:
  description: >
    Implementa o seguinte plano aprovado pelo utilizador:

    {architect_plan}

    Para cada ficheiro do plano:
    1. Lê o conteúdo COMPLETO com read_file antes de modificar
    2. Para .py: usa validate_python_syntax antes de write_file
    3. Para .ts/.tsx: usa validate_typescript antes de write_file
    4. Usa write_file (mostra diff e pede aprovação ao utilizador)
    5. Nunca cries ficheiros fora do plano acima

    No final, usa write_project_memory para registar decisões importantes.

    Responde em português.
  expected_output: >
    Lista de ficheiros criados/modificados.
    Confirmação de que nenhuma funcionalidade existente foi removida.
    Decisões importantes registadas na memória do projeto.
  agent: developer

fix_task:
  description: >
    O Reviewer encontrou os seguintes problemas:

    {review_feedback}

    Corrige APENAS os problemas listados:
    1. Lê o conteúdo atual de cada ficheiro
    2. Para .py: validate_python_syntax antes de write_file
    3. Para .ts/.tsx: validate_typescript antes de write_file
    4. Não faças outras alterações além das correções pedidas

    Responde em português.
  expected_output: >
    Correções aplicadas, ficheiro por ficheiro.
    Confirmação de que os problemas foram resolvidos.
  agent: developer

review_task:
  description: >
    Revê as alterações em {project_path} face ao pedido: {feature_request}

    Plano que foi implementado:
    {architect_plan}

    1. Usa run_tests em {project_path} — corre a suite de testes existente
    2. Lê os ficheiros modificados e verifica o checklist

    CHECKLIST (responde Sim/Não a cada ponto):
    1. Todos os endpoints/funções que existiam antes ainda existem?
    2. Os imports Python usam pontos (não barras)?
    3. Foram criados ficheiros fora do plano aprovado?
    4. Os testes passam?
    5. O código segue os padrões do projeto?

    Usa write_project_memory para registar problemas recorrentes ou padrões úteis.

    Responde em português.
  expected_output: >
    ## Resultado dos testes
    <output do run_tests>

    ## Checklist
    1. Endpoints preservados: Sim/Não — <detalhe>
    2. Imports corretos: Sim/Não — <detalhe>
    3. Scope respeitado: Sim/Não — <detalhe>
    4. Testes: Sim/Não — <detalhe>
    5. Padrões: Sim/Não — <detalhe>

    ## Veredicto
    ✅ Aprovado / ❌ Requer correções

    ## Problemas encontrados
    <lista detalhada para o Developer corrigir, se existirem>
  agent: reviewer
